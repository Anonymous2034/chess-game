services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-grandmasters}
      POSTGRES_USER: ${DB_USER:-grandmasters}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-grandmasters}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public:ro
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-grandmasters}
      DB_USER: ${DB_USER:-grandmasters}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      PORT: 3000

volumes:
  pgdata:
